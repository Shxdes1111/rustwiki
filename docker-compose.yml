version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: rustwiki
      POSTGRES_USER: rustwiki_user
      POSTGRES_PASSWORD: rustwiki_pass
    ports:  
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustwiki_user -d rustwiki"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: