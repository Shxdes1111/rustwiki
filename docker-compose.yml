version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: rustwiki
      POSTGRES_USER: rustwiki_user
      POSTGRES_PASSWORD: rustwiki_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d  
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustwiki_user -d rustwiki"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: rustwiki_backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=rustwiki_user
      - DB_PASSWORD=rustwiki_pass
      - DB_NAME=rustwiki
      - DB_SSL_MODE=disable
      
  frontend:
    build: ./frontend
    container_name: rustwiki_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres-data: