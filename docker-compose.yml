version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: rustwiki
      POSTGRES_USER: rustwiki_user
      POSTGRES_PASSWORD: rustwiki_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d  
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustwiki_user -d rustwiki"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: rustwiki_backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=rustwiki_user
      - DB_PASSWORD=rustwiki_pass
      - DB_NAME=rustwiki
      - DB_SSL_MODE=disable
      - JWT_SECRET=rustwiki-secret-change-in-production
      - PUBLIC_URL=${TUNNEL_URL}
      # - PUBLIC_URL=http://localhost:8080
      
  frontend:
    build: ./frontend
    container_name: rustwiki_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - API_PROXY=http://backend:8080
      - UPLOAD_PROXY=http://backend:8080
      - VITE_API_BASE=${TUNNEL_URL}
      # - VITE_API_BASE=http://localhost:5173

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  pgadmin-data: